# Inspired by https://github.com/coreos/repo-templates

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns:
          - "*"
  - package-ecosystem: "gomod"
    directories:
      - "/"
      - "/tools/virtctl"
    schedule:
      interval: "weekly"
    groups:
      golang:
        patterns:
          - "*"
    ignore:
      # Block newer versions of k8s until bump of OpenShift CI
      - dependency-name: "k8s.io/api"
        versions: [">=0.36"]
      - dependency-name: "k8s.io/apimachinery"
        versions: [">=0.36"]
      - dependency-name: "sigs.k8s.io/controller-runtime"
        versions: [">=0.24"]
      - dependency-name: "sigs.k8s.io/controller-tools"
        versions: [">=0.21"]
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      rust:
        patterns:
          - "*"
    ignore:
      - dependency-name: "rand_core"
        # Block newer versions of rand_core, incompatible
        versions: [">=0.7"]
      - dependency-name: "kopium"
        # Block newer versions of kopium until we bump to k8s 1.36
        versions: [">=0.23.0"]
